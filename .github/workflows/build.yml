name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flet
    
    - name: Build APK
      run: |
        flet build apk .
    
    - name: Upload APK  # <--- 只修改这里，从 v3 改为 v4
      uses: actions/upload-artifact@v4
      with:
        name: greenhouse-app
        path: build/apk/*.apk
